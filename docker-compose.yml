version: '3.9'
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: masterauto
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - pg_data:/var/lib/postgresql/data

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - '1025:1025'
      - '8025:8025'

  backend:
    build:
      context: ./backend
    environment:
      NODE_ENV: development
      PORT: 5000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: masterauto
      JWT_SECRET: super-secret-key-change-me
      EMAIL_PROVIDER: smtp
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
      SMTP_SECURE: 'false'
      SMTP_TLS_REJECT_UNAUTHORIZED: 'false'
      SMTP_FROM: 'MasterAuto <no-reply@masterauto.local>'
      SMTP_REPLY_TO: 'support@masterauto.local'
    ports:
      - '5000:5000'
    depends_on:
      - postgres
      - mailhog

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: http://localhost:5000/api
    ports:
      - '5173:5173'
    depends_on:
      - backend

volumes:
  pg_data:
